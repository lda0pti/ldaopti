<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDA Opti PC — Maintenance</title>
  <meta name="description" content="LDA Opti PC est actuellement en maintenance.">
  <meta name="theme-color" content="#0b0f17">
  <link rel="icon" href="assets/logo.svg">
  <style>
    :root {
      --bg: #070a10;
      --panel: rgba(18, 23, 34, 0.86);
      --text: #f7f8fb;
      --muted: #9da7b7;
      --accent: #ff7a00;
      --accent-soft: rgba(255, 122, 0, 0.16);
      --border: rgba(255,255,255,0.09);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 122, 0, 0.15), transparent 32%),
        radial-gradient(circle at 85% 80%, rgba(255, 122, 0, 0.08), transparent 28%),
        var(--bg);
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 92%);
    }

    .maintenance {
      position: relative;
      width: min(920px, 100%);
      padding: 52px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0,0,0,0.45);
      backdrop-filter: blur(18px);
    }

    .logo {
      width: 76px;
      height: 76px;
      object-fit: contain;
      margin-bottom: 22px;
      filter: drop-shadow(0 10px 28px rgba(255,122,0,0.24));
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 22px;
      padding: 9px 14px;
      border: 1px solid rgba(255,122,0,0.28);
      border-radius: 999px;
      color: #ffad61;
      background: var(--accent-soft);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(255,122,0,0.65);
      animation: pulse 1.8s infinite;
    }

    h1 {
      max-width: 760px;
      margin: 0 auto 16px;
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 0.98;
      letter-spacing: -0.055em;
    }

    .lead {
      max-width: 650px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.7;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 38px 0 30px;
    }

    .time-box {
      padding: 22px 12px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.035);
    }

    .time-box strong {
      display: block;
      color: var(--accent);
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .time-box span {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .status {
      color: #c8ced8;
      font-size: 0.94rem;
    }

    .status b {
      color: #fff;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,122,0,0.55); }
      70% { box-shadow: 0 0 0 10px rgba(255,122,0,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,122,0,0); }
    }

    @media (max-width: 640px) {
      .maintenance {
        padding: 34px 18px;
        border-radius: 22px;
      }

      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="maintenance">
    <img class="logo" src="assets/logo.svg" alt="Logo LDA Opti PC">

    <div class="badge">
      <span class="dot"></span>
      Maintenance en cours
    </div>

    <h1>LDA Opti revient très bientôt.</h1>

    <p class="lead">
      Nous améliorons actuellement le site et les services LDA Opti PC
      afin de vous proposer une expérience plus rapide, plus propre et plus fiable.
    </p>

    <section class="countdown" aria-label="Compte à rebours avant la réouverture">
      <div class="time-box"><strong id="days">03</strong><span>Jours</span></div>
      <div class="time-box"><strong id="hours">00</strong><span>Heures</span></div>
      <div class="time-box"><strong id="minutes">00</strong><span>Minutes</span></div>
      <div class="time-box"><strong id="seconds">00</strong><span>Secondes</span></div>
    </section>

    <p class="status">Réouverture prévue le <b>16 juillet 2026 à 23 h 44</b>.</p>
  </main>

  <script>
    const deadline = new Date("2026-07-16T23:44:41+02:00").getTime();

    const elements = {
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds")
    };

    function updateCountdown() {
      const remaining = deadline - Date.now();

      if (remaining <= 0) {
        Object.values(elements).forEach(el => el.textContent = "00");
        document.querySelector(".badge").innerHTML = '<span class="dot"></span> Maintenance terminée';
        document.querySelector("h1").textContent = "LDA Opti est de retour.";
        document.querySelector(".lead").textContent = "Le site est de nouveau disponible. Actualisation en cours…";
        setTimeout(() => location.reload(), 3000);
        return;
      }

      const days = Math.floor(remaining / 86400000);
      const hours = Math.floor((remaining % 86400000) / 3600000);
      const minutes = Math.floor((remaining % 3600000) / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);

      elements.days.textContent = String(days).padStart(2, "0");
      elements.hours.textContent = String(hours).padStart(2, "0");
      elements.minutes.textContent = String(minutes).padStart(2, "0");
      elements.seconds.textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
